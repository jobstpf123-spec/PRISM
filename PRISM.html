<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PRISM — Tripack Films</title>
<script src="xlsx.mini.min.js"></script>
<style>
/* ===== PRISM — Personality, Resolution & Integrated Style Mapping ===== */
:root{--navy:#0F4C81;--navy-d:#0C3E69;--ink:#0C2233;--slate:#5B6B7C;--line:#E4E9F0;
--canvas:#F4F7FB;--paper:#fff;--good:#2E7D32;
--prism:linear-gradient(90deg,#3d6fb4,#6a5dc0,#4aa3b8)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;color:var(--ink);
background:#eef2f7;min-height:100vh;-webkit-font-smoothing:antialiased}
/* subtle prism backdrop */
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
background:
 radial-gradient(1100px 520px at 88% -8%,rgba(106,93,192,.06),transparent 60%),
 radial-gradient(900px 500px at 6% 108%,rgba(61,111,180,.07),transparent 60%),
 linear-gradient(180deg,#f2f5f9,#eaeef4)}
/* ===== app header (persistent nav, carries the logo) ===== */
.appheader{position:relative;z-index:2;background:#fff;border-bottom:1px solid var(--line);
box-shadow:0 1px 0 rgba(12,34,51,.02),0 6px 22px rgba(12,34,51,.04)}
.appheader .prismline{height:3px;background:var(--prism);opacity:.55}
.appheader .inner{max-width:940px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:16px}
.brandlogo{height:38px;width:auto;display:block}
.hdiv{width:1px;height:30px;background:var(--line)}
.wordmark{display:flex;flex-direction:column;line-height:1.05}
.wordmark b{font-size:18px;letter-spacing:.34em;color:var(--ink);font-weight:700;padding-left:2px}
.wordmark small{font-size:9.5px;letter-spacing:.13em;color:var(--slate);text-transform:uppercase;margin-top:3px}
.hdr-tag{margin-left:auto;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);
border:1px solid var(--line);padding:6px 12px;border-radius:20px;font-weight:600}
/* ===== layout ===== */
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:40px 18px 64px}
.card{background:var(--paper);border-radius:18px;border:1px solid #eaeef4;
box-shadow:0 2px 4px rgba(12,34,51,.03),0 24px 60px rgba(12,34,51,.09);overflow:hidden}
.card-pad{padding:34px 36px}
.eyebrow{font-size:11px;letter-spacing:.22em;color:var(--navy);font-weight:700;text-transform:uppercase}
h1{font-size:25px;margin:8px 0 6px;letter-spacing:-.01em}
.lead{color:var(--slate);font-size:14px;line-height:1.65}
/* login hero */
.hero{text-align:center;padding:14px 0 4px}
.hero .logo-lg{height:74px;width:auto;margin:0 auto 16px;display:block}
.hero .pmark{width:132px;height:auto;margin:2px auto 14px;display:block;opacity:.9}
.hero .title{font-size:26px;letter-spacing:.36em;font-weight:700;color:var(--ink);padding-left:6px}
.hero .expand{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);margin-top:8px}
.hero .rule{height:3px;width:80px;background:var(--prism);opacity:.6;border-radius:3px;margin:16px auto 0}
label{display:block;font-size:12px;font-weight:600;color:var(--slate);margin:16px 0 6px;letter-spacing:.02em}
input[type=text],input[type=password]{width:100%;font:inherit;font-size:15px;padding:13px 14px;
border:1.5px solid var(--line);border-radius:10px;background:#fff;transition:border-color .15s}
input[type=text]:focus,input[type=password]:focus{outline:none;border-color:var(--navy);
box-shadow:0 0 0 3px rgba(15,76,129,.08)}
.btn{font:inherit;font-weight:600;font-size:15px;border:none;border-radius:11px;padding:14px 22px;cursor:pointer;
background:var(--navy);color:#fff;transition:background .15s,transform .05s}
.btn:hover{background:var(--navy-d)}.btn:active{transform:translateY(1px)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-lg{width:100%;margin-top:22px;padding:16px}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--line)}
.btn-ghost:hover{background:var(--canvas)}
.msg{margin-top:14px;font-size:13px;padding:11px 14px;border-radius:9px;display:none}
.msg.err{display:block;background:#fbeceb;color:#9b2620;border:1px solid #f1c9c6}
.msg.ok{display:block;background:#e9f3ea;color:#1f5b23;border:1px solid #c5e0c7}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.idcard{background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:18px}
.idcard .nm{font-size:18px;font-weight:700}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
.chip{font-size:11.5px;background:#fff;border:1px solid var(--line);padding:5px 11px;border-radius:20px;font-weight:600;color:var(--navy)}
.instr{margin-top:18px;background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.instr ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.instr li{font-size:13px;color:var(--ink);line-height:1.5;padding-left:24px;position:relative}
.instr li::before{content:"";position:absolute;left:0;top:3px;width:13px;height:13px;border-radius:3px;
background:var(--prism);opacity:.85}
/* progress */
.topbar{display:flex;align-items:center;gap:14px;padding:16px 24px;border-bottom:1px solid var(--line);background:#fff}
.prog{flex:1;height:7px;background:var(--line);border-radius:6px;overflow:hidden}
.prog>i{display:block;height:100%;background:var(--prism);width:0;transition:width .4s}
.pcount{font-size:12px;color:var(--slate);font-weight:600;font-variant-numeric:tabular-nums}
.timer{font-size:12px;color:var(--slate);font-variant-numeric:tabular-nums;min-width:46px;text-align:right}
/* scenario */
.scn{padding:28px 32px 32px}
.scn .tag{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--navy);font-weight:700}
.scn .setting{font-size:12.5px;color:var(--slate);margin:3px 0 14px;font-weight:600}
.stem{font-size:17px;line-height:1.62;margin-bottom:8px}
.prompt{font-size:14px;color:var(--slate);margin:14px 0 4px;font-weight:600}
.opts{display:flex;flex-direction:column;gap:11px;margin-top:14px}
.opt{text-align:left;font:inherit;font-size:14.5px;line-height:1.5;padding:15px 17px;border:1.5px solid var(--line);
border-radius:12px;background:#fff;cursor:pointer;transition:all .12s;display:flex;gap:12px;align-items:flex-start}
.opt:hover{border-color:var(--navy);background:var(--canvas)}
.opt .k{flex:0 0 24px;height:24px;border-radius:7px;background:var(--canvas);color:var(--navy);font-weight:700;
display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid var(--line)}
.opt.sel{border-color:var(--navy);background:#eef4fb}.opt.sel .k{background:var(--navy);color:#fff;border-color:var(--navy)}
.scn-foot{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.hint{font-size:12px;color:var(--slate)}
/* confirmation (employee end state — no results) */
.done{text-align:center;padding:44px 34px 40px}
.done .pmark{width:120px;height:auto;margin:0 auto 8px;display:block}
.tick{width:66px;height:66px;border-radius:50%;background:#e9f3ea;color:var(--good);display:flex;align-items:center;
justify-content:center;margin:0 auto 20px;font-size:32px}
.done h1{margin-bottom:14px;font-size:23px}
.done p{color:var(--slate);font-size:14px;line-height:1.7;max-width:430px;margin:0 auto 10px}
.done .close{margin-top:22px;font-size:12.5px;color:var(--slate);letter-spacing:.02em}
/* footer + admin gate */
.footer{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 18px 40px;text-align:center}
.footer a{color:#9aa8b6;font-size:11.5px;cursor:pointer;text-decoration:none;letter-spacing:.03em}
.footer a:hover{color:var(--slate);text-decoration:underline}
.footer .cprt{display:block;color:#aeb9c5;font-size:10.5px;margin-top:10px;letter-spacing:.04em}
/* admin portal */
.adminwrap .ahead{display:flex;align-items:center;gap:14px;padding:22px 28px;border-bottom:1px solid var(--line)}
.adminwrap .ahead img{height:34px}
.adminwrap .ahead .at{font-size:16px;font-weight:700;letter-spacing:.02em}
.adminwrap .ahead .at small{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);font-weight:600;margin-top:2px}
.abody{padding:26px 28px}
.arow{border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px;background:#fff}
.arow h3{font-size:13px;letter-spacing:.02em;margin-bottom:6px}
.arow p{font-size:12.5px;color:var(--slate);line-height:1.55;margin-bottom:10px}
.astat{display:flex;gap:22px;margin:2px 0 4px}
.astat div{font-size:11px;color:var(--slate);letter-spacing:.06em;text-transform:uppercase}
.astat span{display:block;font-size:24px;font-weight:700;color:var(--navy);font-family:Georgia,serif}
.amini{font-size:12.5px;color:var(--slate)}
.tbtn{font:inherit;font-size:11px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--navy);
border-radius:6px;padding:4px 8px;margin-left:4px;cursor:pointer}
.tbtn:hover{background:var(--canvas)}
.tbtn.on{background:#e9f3ea;border-color:var(--good);color:var(--good)}
.tbtn.del{color:#b3403a;border-color:#e6c4c1}.tbtn.del:hover{background:#fbeceb}
input[type=file]{font-size:12.5px;color:var(--slate)}
.note{background:#eef4fa;border-left:3px solid var(--navy);padding:11px 14px;border-radius:0 8px 8px 0;font-size:12px;line-height:1.55;color:#22394b;margin-top:4px}
/* ===== battery item-type interactions ===== */
.modintro{padding:8px 4px 4px}
.modintro .mtag{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--navy);font-weight:700}
.modintro h1{margin:6px 0 8px}
.modstep{display:flex;gap:8px;margin:16px 0 4px}
.modstep .s{flex:1;height:5px;border-radius:4px;background:var(--line)}
.modstep .s.on{background:var(--prism)}
.pickrow{display:flex;gap:10px;margin-bottom:8px}
.pickrow .pl{font-size:12px;font-weight:700;letter-spacing:.02em}
.pickrow .pl.most{color:var(--good)}.pickrow .pl.least{color:#b3403a}
.opt .tagbtns{margin-left:auto;display:flex;gap:6px;flex:0 0 auto}
.tagbtn{font:inherit;font-size:11px;font-weight:700;border:1.5px solid var(--line);background:#fff;color:var(--slate);
border-radius:7px;padding:5px 9px;cursor:pointer;transition:all .12s}
.tagbtn.m.on{background:#e9f3ea;border-color:var(--good);color:var(--good)}
.tagbtn.l.on{background:#fbeceb;border-color:#b3403a;color:#b3403a}
.opt.most{border-color:var(--good);background:#f2f9f3}
.opt.least{border-color:#e6a9a4;background:#fdf4f3}
.opt.most .k{background:var(--good);color:#fff;border-color:var(--good)}
.opt.least .k{background:#b3403a;color:#fff;border-color:#b3403a}
.scale{display:flex;gap:8px;margin-top:16px}
.scale button{flex:1;font:inherit;font-size:13px;font-weight:600;border:1.5px solid var(--line);background:#fff;
color:var(--ink);border-radius:10px;padding:14px 6px;cursor:pointer;transition:all .12s;display:flex;
flex-direction:column;align-items:center;gap:6px}
.scale button .n{font-size:17px;font-weight:700;color:var(--navy)}
.scale button:hover{border-color:var(--navy);background:var(--canvas)}
.scale button.sel{border-color:var(--navy);background:#eef4fb;box-shadow:0 0 0 3px rgba(15,76,129,.08)}
.scale button .lab{font-size:9.5px;color:var(--slate);text-align:center;line-height:1.2;letter-spacing:.02em}
.rankopt{display:flex;align-items:center;gap:12px;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;
background:#fff;cursor:pointer;margin-bottom:10px;transition:all .12s;font-size:14px;line-height:1.45}
.rankopt:hover{border-color:var(--navy);background:var(--canvas)}
.rankopt.done{border-color:var(--navy);background:#eef4fb}
.rankbadge{flex:0 0 28px;height:28px;border-radius:8px;border:1.5px dashed var(--line);color:var(--slate);
display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.rankopt.done .rankbadge{background:var(--navy);color:#fff;border-style:solid;border-color:var(--navy)}
.rankhint{font-size:12px;color:var(--slate);margin-top:2px}
.modchip{display:inline-block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);
font-weight:700;background:#eef4fb;border:1px solid #d8e6f3;padding:4px 10px;border-radius:20px}
@media(max-width:560px){.row2{grid-template-columns:1fr}.card-pad,.scn,.abody{padding:22px}
.appheader .inner{padding:12px 16px}.hdr-tag{display:none}.wordmark b{font-size:16px;letter-spacing:.28em}}
</style>
</head>
<body>
<header class="appheader">
  <div class="prismline"></div>
  <div class="inner">
    <img class="brandlogo" id="brandLogo" alt="Tri-Pack Films Limited">
    <div class="hdiv"></div>
    <div class="wordmark"><b>PRISM</b><small>Personality · Resolution &amp; Integrated Style Mapping</small></div>
    <div class="hdr-tag" id="hdrTag">Behavioural Assessment</div>
  </div>
</header>
<div class="wrap"><div class="card" id="app"></div></div>
<div class="footer">
  <a id="adminLink">Administrator access</a>
  <span class="cprt">© Tripack Films Limited · PRISM Behavioural Assessment · Confidential</span>
</div>

fer to hire people who are already fully skilled for the role"},{"k":"C","t":"I believe employees should take primary responsibility for their own development"},{"k":"D","t":"I focus on achieving team targets rather than individual development"}],"scoring":{"most":"A","most_val":2,"least":"B","least_val":-2},"minGrade":"E1","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Attitude","defaulted":false},{"id":"LS3-003","type":"RCL","stem":"Developing my team members' skills is one of my highest priorities as a leader.","options":[],"scoring":{"scale":"5pt_agree"},"minGrade":"E1","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Behaviour","defaulted":false},{"id":"LS3-004","type":"BFS","stem":"How often do you have one-on-one conversations with team members specifically about their career development and growth?","options":[],"scoring":{"scale":"5pt_freq"},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Behaviour","defaulted":false},{"id":"LS3-005","type":"RNK","stem":"Rank the following coaching approaches from MOST effective (1) to LEAST effective (5) for developing a struggling but motivated employee:","options":[{"k":"A","t":"Regular one-on-one coaching with hands-on demonstration"},{"k":"B","t":"Sending them on an external training course"},{"k":"C","t":"Providing detailed written instructions and expecting self-study"},{"k":"D","t":"Reassigning them to a role that better matches their current skills"},{"k":"E","t":"Giving them a mentor from another department for fresh perspective"}],"scoring":{"rank_scores":{"A":2,"E":1}},"minGrade":"E2","depts":["Production","HR","Engineering","Commercial"],"reverse":false,"weight":0.2,"perspective":"Interpersonal Preference","defaulted":false}]},{"code":"LS4","name":"Participative Engagement","altName":"Democratic Leadership","sci":"Lewin (1939); Vroom-Yetton (1973); Pearce & Conger (2003)","behaviour":"Consultation frequency; listening behaviour; consensus-building skill; deleg ":"E","t":"Begin detailed daily reporting to preempt further scrutiny"}],"scoring":{"scores":{"A":3,"C":1,"B":0}},"minGrade":"E3","depts":["Engineering","IT","Maintenance","Planning"],"reverse":false,"weight":0.2,"perspective":"Decision Making","defaulted":false},{"id":"LS5-002","type":"IFC","stem":"Choose the statement that is MOST like you and LEAST like you:","options":[{"k":"A","t":"I trust my team to manage their own work with minimal supervision"},{"k":"B","t":"I prefer to be closely involved in every task my team performs"},{"k":"C","t":"I set clear expectations and then let people find their own way to achieve them"},{"k":"D","t":"I believe regular check-ins are essential for maintaining quality standards"}],"scoring":{"most":"A","most_val":2,"least":"B","least_val":-2},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Attitude","defaulted":false},{"id":"LS5-003","type":"RCL","stem":"I find it difficult to delegate important tasks without checking on progress frequently.","options":[],"scoring":{"scale":"5pt_agree"},"minGrade":"E2","depts":["ALL"],"reverse":true,"weight":0.2,"perspective":"Self-Regulation","defaulted":false},{"id":"LS5-004","type":"BFS","stem":"How often do you intervene in your team's day-to-day work activities to correct or redirect their approach?","options":[],"scoring":{"scale":"5pt_freq"},"minGrade":"E2","depts":["ALL"],"reverse":true,"weight":0.2,"perspective":"Behaviour","defaulted":false},{"id":"LS5-005","type":"RNK","stem":"Rank the following management styles from MOST effective (1) to LEAST effective (5) for managing a team of experienced, self-motivated professionals:","options":[{"k":"A","t":"Define outcomes clearly, then give complete freedom on methods"},{"k":"B","t":"Regular collaborative meetings with shared decision-making"},{"k":"C","t":"Daily stand-ups with detailed task assignment and monitoring"},{"k":"D","t":"Weekly one-on-ones focusing on coaching and development"},{"k":"E","t":"Hands-off co portant than external rewards"},{"k":"C","t":"I consistently follow through on promised rewards and recognition"},{"k":"D","t":"I prefer to reward team effort rather than individual performance"}],"scoring":{"most":"A","most_val":2,"least":"D","least_val":-2},"minGrade":"E1","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Attitude","defaulted":true},{"id":"LS10-003","type":"RCL","stem":"I always deliver on the rewards and recognition I promise to my team members.","options":[],"scoring":{"scale":"5pt_agree"},"minGrade":"E1","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Behaviour","defaulted":false},{"id":"LS10-004","type":"BFS","stem":"How often do you provide specific, contingent recognition or rewards linked to clearly defined performance achievements?","options":[],"scoring":{"scale":"5pt_freq"},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Behaviour under Pressure","defaulted":false},{"id":"LS10-005","type":"RNK","stem":"Rank management approaches when a team member underperforms consistently:","options":[{"k":"A","t":"Have a direct conversation about expectations and consequences"},{"k":"B","t":"Provide additional training and support to address skill gaps"},{"k":"C","t":"Document the performance gap and initiate formal review process"},{"k":"D","t":"Reassign them to a role that better matches their capabilities"},{"k":"E","t":"Accept the performance as long as it doesn't seriously impact the team"}],"scoring":{"rank_scores":{"A":2,"B":1}},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Interpersonal Preference","defaulted":true}]},{"code":"LS-S1","name":"Flexibility in Approach","altName":"Situational Adaptability","sci":"Hersey & Blanchard (1969); Yukl & Mahsud (2010); Derue et al. (2011)","behaviour":"Style-switching flexibility; contextual reading; approach adaptation; versatility demonstration","competencies":"Adaptive Leadership, Contextual Intelligence, Versatility, Judgment","items":[{"id":"LS-S1-001","type":"SJT","stem":"You have two new hires and three experienced operators on your shift. A quality emergency requires immediate containment action. The new hires look anxious and the experienced operators have different opinions on the best approach. What do you do?","options":[{"k":"A","t":"Give the experienced operators specific authority to act while providing clear direction to the new hires"},{"k":"B","t":"Call for a quick team vote to decide the best containment approach"},{"k":"C","t":"Take complete control and direct everyone step-by-step"},{"k":"D","t":"Ask the most senior operator to lead while you observe"},{"k":"E","t":"Gather everyone for a 5-minute discussion to reach consensus"}],"scoring":{"scores":{"A":3,"E":0,"B":1}},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Decision Making","defaulted":true},{"id":"LS-S1-002","type":"IFC","stem":"Choose MOST/LEAST:","options":[{"k":"A","t":"I adjust my leadership style based on the experience level of my team"},{"k":"B","t":"I use the same leadership approach regardless of the situation"},{"k":"C","t":"I am comfortable switching between directive and supportive behaviours"},{"k":"D","t":"I believe leaders should have one consistent style that defines them"}],"scoring":{"most":"A","most_val":2,"least":"D","least_val":-2},"minGrade":"E1","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Attitude","defaulted":true},{"id":"LS-S1-003","type":"RCL","stem":"I find it difficult to change my natural leadership style even when the situation clearly calls for a different approach.","options":[],"scoring":{"scale":"5pt_agree"},"minGrade":"E1","depts":["ALL"],"reverse":true,"weight":0.2,"perspective":"Behaviour","defaulted":false},{"id":"LS-S1-004","type":"BFS","stem":"How often do you consciously adjust your leadership approach based on the specific situation or people involved?","options":[],"scoring":{"scale":"5pt_freq"},"minGrade":"E2","depts":[" ctively?","options":[],"scoring":{"scale":"5pt_freq"},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Behaviour under Pressure","defaulted":false},{"id":"LS-S3-005","type":"RNK","stem":"Rank indicators of an empowered team from MOST important (1) to LEAST (5):","options":[{"k":"A","t":"Team members make decisions without needing your approval"},{"k":"B","t":"Team members propose improvements and implement them independently"},{"k":"C","t":"Team members ask for your input but decide for themselves"},{"k":"D","t":"Team members execute tasks you assign with minimal questions"},{"k":"E","t":"Team members always consult you before taking action"}],"scoring":{"rank_scores":{"A":2,"B":1}},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Interpersonal Preference","defaulted":true}]},{"code":"LS-S4","name":"Decisiveness Under Pressure","altName":"","sci":"Klein (1993); Kahneman (2011); Judge et al. (2009)","behaviour":"Speed of decision; comfort with ambiguity; risk tolerance; commitment to chosen course","competencies":"Crisis Management, Decision Quality, Confidence, Action Orientation","items":[{"id":"LS-S4-001","type":"SJT","stem":"At 2:00 AM, you receive calls simultaneously from the production floor (batch contamination suspected), maintenance (boiler pressure anomaly), and security (unauthorised contractor on site). You are the only manager on duty. What do you do?","options":[{"k":"A","t":"Prioritise by safety risk: contain contamination first, then boiler, then security"},{"k":"B","t":"Head to the production floor personally while calling for additional management support"},{"k":"C","t":"Request detailed status reports from all three before deciding priorities"},{"k":"D","t":"Delegate each issue to the most senior person present and coordinate by phone"},{"k":"E","t":"Focus on the contamination as the most serious issue and address others later"}],"scoring":{"scores":{"A":3,"E":0,"B":1}},"minGrade":"E2","depts": ,"options":[],"scoring":{"scale":"5pt_agree"},"minGrade":"E1","depts":["ALL"],"reverse":true,"weight":0.2,"perspective":"Behaviour","defaulted":false},{"id":"LS-S5-004","type":"BFS","stem":"How often do you take personal responsibility for team failures rather than blaming circumstances or individuals?","options":[],"scoring":{"scale":"5pt_freq"},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Behaviour under Pressure","defaulted":false},{"id":"LS-S5-005","type":"RNK","stem":"Rank responses to a significant team failure from MOST like you (1) to LEAST (5):","options":[{"k":"A","t":"Accept responsibility publicly and present a prevention plan"},{"k":"B","t":"Analyse what went wrong systematically without assigning blame"},{"k":"C","t":"Address the issue privately with those most involved"},{"k":"D","t":"Explain the external factors that contributed to the failure"},{"k":"E","t":"Wait for management to assign responsibility before responding"}],"scoring":{"rank_scores":{"A":2,"B":1}},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Interpersonal Preference","defaulted":true}]},{"code":"LS-S6","name":"Emotional Intelligence","altName":"Emotional Presence","sci":"Goleman (1995); Mayer & Salovey (1997); Miao et al. (2017)","behaviour":"Emotional self-awareness; empathy; emotional regulation; interpersonal sensitivity","competencies":"Relationship Management, Empathy, Self-Awareness, Conflict Prevention","items":[{"id":"LS-S6-001","type":"SJT","stem":"During a performance review, a long-serving team member becomes visibly emotional and begins to cry when you discuss an area needing improvement. They have been a loyal employee for 12 years. The meeting room has glass walls and other staff can see. What do you do?","options":[{"k":"A","t":"Pause the review, offer tissues and water, ask if they want a few minutes alone, and reschedule the remainder"},{"k":"B","t":"Continue with the review professionally to maintain the meeting's purpose"},{"k":"C","t":"Acknowledge their emotion briefly but redirect focus back to the performance data"},{"k":"D","t":"Express surprise at their reaction and ask why they are so upset"},{"k":"E","t":"End the meeting immediately and suggest they see HR for support"}],"scoring":{"scores":{"A":3,"E":0,"B":1}},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Decision Making","defaulted":true},{"id":"LS-S6-002","type":"IFC","stem":"Choose MOST/LEAST:","options":[{"k":"A","t":"I can tell how my team members are feeling even when they don't say it directly"},{"k":"B","t":"I prefer to keep work relationships professional and avoid emotional discussions"},{"k":"C","t":"I adjust my communication based on the emotional state of the person I'm talking to"},{"k":"D","t":"I believe emotions should be left at the door in a manufacturing environment"}],"scoring":{"most":"A","most_val":2,"least":"D","least_val":-2},"minGrade":"E1","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Attitude","defaulted":true},{"id":"LS-S6-003","type":"RCL","stem":"I sometimes say things that hurt people's feelings without realising it until later.","options":[],"scoring":{"scale":"5pt_agree"},"minGrade":"E1","depts":["ALL"],"reverse":true,"weight":0.2,"perspective":"Behaviour","defaulted":false},{"id":"LS-S6-004","type":"BFS","stem":"How often do you notice and respond appropriately to the emotional cues of your team members?","options":[],"scoring":{"scale":"5pt_freq"},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Behaviour under Pressure","defaulted":false},{"id":"LS-S6-005","type":"RNK","stem":"Rank your emotional intelligence strengths from HIGHEST (1) to LOWEST (5):","options":[{"k":"A","t":"Recognising emotions in others and responding appropriately"},{"k":"B","t":"Managing my own emotions under stress"},{"k":"C","t":"Building genuine personal connections with team members"},{"k":"D","t":"Reading group dynamics and te ition to keep relationships positive"},{"k":"B","t":"I believe standing your ground earns more respect than being accommodating"},{"k":"C","t":"I prioritise harmony in my team over being right"},{"k":"D","t":"I think accommodating people too much encourages them to take advantage"}],"scoring":{"most":"A","most_val":2,"least":"D","least_val":-2},"minGrade":"E1","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Attitude","defaulted":true},{"id":"CR5-003","type":"RCL","stem":"I am comfortable letting others have their way even when I disagree, if it preserves the working relationship.","options":[],"scoring":{"scale":"5pt_agree"},"minGrade":"E1","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Behaviour","defaulted":false},{"id":"CR5-004","type":"BFS","stem":"How often do you yield your position or preferences to accommodate others and maintain positive relationships?","options":[],"scoring":{"scale":"5pt_freq"},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Behaviour under Pressure","defaulted":false},{"id":"CR5-005","type":"RNK","stem":"Rank accommodating behaviours from MOST frequent (1) to LEAST (5):","options":[{"k":"A","t":"Giving in to keep the peace"},{"k":"B","t":"Apologising even when you are not at fault"},{"k":"C","t":"Putting others' needs ahead of your own"},{"k":"D","t":"Accepting decisions you disagree with"},{"k":"E","t":"Avoiding expressing disagreement to prevent tension"}],"scoring":{"rank_scores":{"A":2,"B":1}},"minGrade":"E2","depts":["ALL"],"reverse":false,"weight":0.2,"perspective":"Interpersonal Preference","defaulted":true}]},{"code":"CR-S1","name":"Conflict Anticipation","altName":"Conflict Recognition","sci":"Deutsch & Coleman (2006); Jehn & Bendersky (2003); Dijkstra (2012)","behaviour":"Early warning sensitivity; pattern recognition; proactive inquiry; tension detection","competencies":"Situational Awareness, Emotional Intelligence, Preventive Action, Observation Skill","items":[{"id":"CR-S /* ============================ RANDOM ENGINE (seeded, per-employee, per-attempt) ============================
   A deterministic seeded PRNG: reproducible for a given employee+attempt (useful for admin QA / support),
   yet different for every employee and every re-assessment attempt, satisfying "no two candidates receive
   identical item sets" while keeping a given candidate's own assessment stable if the page is reloaded
   mid-attempt (same session only; a new attempt reseeds). */
function seedFromString(str){let h=1779033703^str.length;
  for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}
  return ()=>{h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);return ((h^=h>>>16)>>>0);};}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
function makeRng(seedStr){const s=seedFromString(seedStr)();return mulberry32(s);}
function shuffle(arr,rng){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)];}

/* ============================ DYNAMIC ASSESSMENT ENGINE ============================
   Grade -> Department -> Applicable Constructs -> Balanced Item Selection -> Assessment
   (Battery §8.1-8.2 Randomisation Architecture). Runs entirely client-side, offline. */
function itemUsableAtGrade(item, gradeTier){ return (GRADE[item.minGrade]||{d:1}).d <= gradeTier; }

function selectItemsForConstruct(construct, gradeTier, dept, rng){
  const items = ITEMS_BY_CONSTRUCT[construct].filter(it=>itemUsableAtGrade(it,gradeTier));
  if(!items.length) return [];
  // department relevance: item.depts includes 'ALL' or the employee's department
  const relevant = items.filter(it=>it.depts.includes("ALL")||it.depts.includes(dept));
  const pool = relevant.length ? relevant : items;               // fall back to all usable items
  const nWanted = gradeTier>=4 ? 3 : 2;                            // Battery §8.2 step 2: 2-3 items/construct
  const chosen = [];
  // Battery §8.2 step 3: ensure >=1 SJT item when one is usable
  const sjt = pool.find(it=>it.type==="SJT") || items.find(it=>it.type==="SJT");
  if(sjt) chosen.push(sjt);
  const remaining = shuffle(pool.filter(it=>!chosen.includes(it)), rng);
  for(const it of remaining){ if(chosen.length>=nWanted) break; chosen.push(it); }
  // if still short (small usable pool), top up from the full item set regardless of dept match
  if(chosen.length<nWanted){
    for(const it of shuffle(items.filter(it=>!chosen.includes(it)),rng)){
      if(chosen.length>=nWanted) break; chosen.push(it);
    }
  }
  return chosen;
}

function rebalanceTypes(selected, gradeTier, dept, rng){
  // Battery §8.2 step 4: no single question type may exceed 40% of the assessment.
  // This can structurally conflict with step 3 ("≥1 SJT per construct") once every one of the
  // 45 constructs contributes an SJT within a ~60-90 item budget — SJT alone can exceed 40%.
  // Where the two rules conflict, the 40% cap takes priority (explicit QA checklist item); SJT
  // coverage is preserved for as many constructs as the cap allows, prioritising constructs that
  // have no other way to reach the cap fix (i.e. only trimmed/swapped when a construct has a safe
  // alternative, so "every construct represented" is never broken to satisfy the cap).
  const cap = Math.floor(selected.length*0.4);
  const byConstruct={}; selected.forEach(s=>{(byConstruct[s.construct]=byConstruct[s.construct]||[]).push(s);});
  let guard=0;
  const countType=t=>selected.filter(s=>s.item.type===t).length;
  const order=shuffle(Object.keys(byConstruct),rng);
  for(const t of Object.keys(TYPE_ORDER)){
    while(countType(t)>cap && guard++<400){
      let fixed=false;
      for(const code of order){
        const mine=byConstruct[code]; if(!mine || mine.length<1) continue;
        const idx=mine.findIndex(s=>s.item.type===t); if(idx<0) continue;
        const victim=mine[idx];
        // try a same-construct swap to a different, still-unused, grade-usable type first
        const alt=ITEMS_BY_CONSTRUCT[code].filter(it=>itemUsableAtGrade(it,gradeTier) && it.type!==t
          && !mine.some(s=>s.item.id===it.id));
        if(alt.length){
          const repl=pick(alt,rng);
          const gi=selected.indexOf(victim); selected[gi]={construct:code,item:repl};
          mine[idx]={construct:code,item:repl};
          fixed=true; break;
        }
        // otherwise, only drop this item outright if the construct still keeps ≥1 other item
        if(mine.length>1){
          const gi=selected.indexOf(victim); selected.splice(gi,1);
          mine.splice(idx,1);
          fixed=true; break;
        }
        // construct has only this one (type-t) item selected — cannot remove without breaking
        // construct coverage; leave it and try the next construct
      }
      if(!fixed) break;   // no further safe fix available for this type; accept remaining share
    }
  }
  return selected;
}

const ATTENTION_ITEMS = [
  {id:"ATN-001",type:"BFS",stem:"Quality check — please select \"Often\" for this item to confirm you are reading each question.",attention:true,correct:4},
  {id:"ATN-002",type:"RCL",stem:"Quality check — please select \"Agree\" for this item to confirm you are reading each question.",attention:true,correct:4}
];

function buildQueue(emp, attemptNumber){
  const gradeTier=(GRADE[emp.grade]||{d:4}).d;
  const rng=makeRng(emp.id+"|"+emp.grade+"|"+emp.dept+"|attempt"+(attemptNumber||1));
  const targetTotal=GRADE_ITEM_TARGET[gradeTier]||65;

  // Step 1: applicable constructs = all 45 (every construct is measured at every grade;
  // only the item-level difficulty/scenario differs — Battery §6, "construct remains the same").
  let selected=[]; // {construct, item}
  CONSTRUCT_CODES.forEach(code=>{
    selectItemsForConstruct(code, gradeTier, emp.dept, rng).forEach(item=>selected.push({construct:code,item}));
  });

  // trim toward the grade's target item count if the natural yield overshoots, but NEVER drop a
  // construct to zero items — Battery §8.1(b): every applicable construct must stay represented.
  if(selected.length>targetTotal+15){
    const byConstruct={};
    selected.forEach(s=>{(byConstruct[s.construct]=byConstruct[s.construct]||[]).push(s);});
    const floor=[];   // one guaranteed item per construct (prefer its SJT if present)
    const extra=[];   // everything beyond the first item per construct — trimmable
    Object.keys(byConstruct).forEach(code=>{
      const items=byConstruct[code];
      const sjtIdx=items.findIndex(s=>s.item.type==="SJT");
      const keepIdx=sjtIdx>=0?sjtIdx:0;
      items.forEach((s,i)=>{ (i===keepIdx?floor:extra).push(s); });
    });
    const room=Math.max(0,targetTotal-floor.length);
    selected=floor.concat(shuffle(extra,rng).slice(0,room));
  }
  // Balance question types AFTER trimming, so the 40% cap is enforced on the assessment the
  // candidate actually receives (not the larger pre-trim pool) — see rebalanceTypes for how the
  // "≥1 SJT per construct" and "≤40% of any one type" rules are reconciled when they conflict.
  selected=rebalanceTypes(selected, gradeTier, emp.dept, rng);

  // group by module, then type-block within module (Battery §8.2 step 6)
  const byModule={LS:[],CR:[],P:[]};
  selected.forEach(s=>byModule[MODULE_OF(s.construct)].push(s));
  MODULE_ORDER.forEach(m=>byModule[m].sort((a,b)=>TYPE_ORDER[a.item.type]-TYPE_ORDER[b.item.type]));

  const steps=[];
  MODULE_ORDER.forEach(m=>{
    if(!byModule[m].length) return;
    steps.push({kind:"modintro",mod:m});
    byModule[m].forEach(s=>steps.push({kind:"item",construct:s.construct,it:s.item}));
  });

  // Battery §8.2 step 7: insert 2 attention-check items at random positions (excluded from scoring)
  const atn=shuffle(ATTENTION_ITEMS,rng);
  atn.forEach(a=>{
    const itemSteps=steps.map((s,i)=>({s,i})).filter(x=>x.s.kind==="item");
    const at=itemSteps.length? pick(itemSteps,rng).i+1 : steps.length;
    steps.splice(at,0,{kind:"item",construct:null,it:a});
  });
  return steps;
}

let timerInt=null,scnStart=0;
function moduleProgress(){
  const total=S.steps.filter(s=>s.kind==="item").length;
  const done=S.steps.slice(0,S.i).filter(s=>s.kind==="item").length;
  return {total,done};
}
function renderStep(){
  const step=S.steps[S.i];
  if(!step){finish();return;}
  if(step.kind==="modintro"){renderModIntro(step);return;}
  renderItem(step);
}

function renderModIntro(step){
  clearInterval(timerInt);
  const m=MODULES[step.mod];
  const idx=MODULE_ORDER.indexOf(step.mod);
  setTag("Assessment");
  const dots=MODULE_ORDER.map((mm,k)=>`<div class="s ${k<=idx?'on':''}"></div>`).join("");
  document.getElementById('app').innerHTML=`<div class="card-pad modintro">
    <div class="mtag">Module ${idx+1} of 3</div>
    <h1>${m.name}</h1>
    <p class="lead">${m.desc}</p>
    <div class="modstep">${dots}</div>
    <p class="lead" style="margin-top:16px;font-size:13px">Answer honestly, based on what you would actually do.
    There are no right or wrong answers.</p>
    <button class="btn btn-lg" id="mgo">${idx===0?'Start the assessment':'Continue to '+m.name}</button>
  </div>`;
  document.getElementById('mgo').onclick=()=>{S.i++;renderStep();};
}

const TYPE_LABEL={SJT:"Situational Judgement",IFC:"Forced Choice",RCL:"Statement",BFS:"Frequency",RNK:"Ranking"};
function itemFrame(step,bodyHtml,footHtml){
  const p=moduleProgress();
  setTag("Assessment");
  const mod=step.construct?MODULE_OF(step.construct):(S._lastMod||"LS");
  if(step.construct) S._lastMod=mod;
  const modName=MODULES[mod]?MODULES[mod].name:"Assessment";
  const tag=step.it.attention?"Quality Check":TYPE_LABEL[step.it.type]||modName;
  document.getElementById('app').innerHTML=`
   <div class="topbar">
     <span class="pcount">${p.done+1} / ${p.total}</span>
     <div class="prog"><i style="width:${(p.done/p.total)*100}%"></i></div>
     <span class="timer" id="tmr">0:00</span>
   </div>
   <div class="scn">
     <div class="tag">${tag}</div>
     <div class="setting">${modName} · ${S.emp.dept}</div>
     ${bodyHtml}
     <div class="scn-foot">${footHtml}</div>
   </div>`;
  scnStart=Date.now();
  clearInterval(timerInt);
  timerInt=setInterval(()=>{const t=document.getElementById('tmr');if(t)t.textContent=fmtTime(Math.floor((Date.now()-S.t0)/1000));},1000);
}

function renderItem(step){
  const it=step.it;
  S.cur={most:null,least:null,val:null,rank:[],single:null};
  if(it.type==="SJT") return renderSJT(step);
  if(it.type==="IFC") return renderIFC(step);
  if(it.type==="RNK") return renderRank(step);
  return renderScale(step); // RCL, BFS
}

/* SJT — single "most likely action" choice, scored against the item's expert key */
function renderSJT(step){
  const it=step.it;
  const body=`
    <div class="stem">${it.stem}</div>
    <div class="prompt">Choose the response you would be <b>most likely</b> to take.</div>
    <div class="opts" id="opts">${it.options.map((o,i)=>`
      <div class="opt" data-i="${i}"><span class="k">${o.k}</span><span>${o.t}</span></div>`).join("")}</div>`;
  itemFrame(step,body,`<span class="hint">Select one.</span><button class="btn" id="next" disabled>Continue</button>`);
  const opts=document.getElementById('opts');
  opts.querySelectorAll('.opt').forEach((el,i)=>el.onclick=()=>{
    S.cur.single=i;
    opts.querySelectorAll('.opt').forEach((e2,j)=>e2.classList.toggle('sel',j===i));
    document.getElementById('next').disabled=false;
  });
  document.getElementById('next').onclick=()=>commit(step);
}

/* IFC — Ipsative Forced Choice: pick MOST and LEAST like me */
function renderIFC(step){
  const it=step.it;
  const body=`
    <div class="stem">${it.stem}</div>
    <div class="prompt">Choose the statement that is <b style="color:var(--good)">MOST</b> like you and the one that is <b style="color:#b3403a">LEAST</b> like you.</div>
    <div class="opts" id="opts">${it.options.map((o,i)=>`
      <div class="opt" data-i="${i}"><span class="k">${o.k}</span><span>${o.t}</span>
      <span class="tagbtns"><button class="tagbtn m" data-t="m" data-i="${i}">Most</button>
      <button class="tagbtn l" data-t="l" data-i="${i}">Least</button></span></div>`).join("")}</div>`;
  itemFrame(step,body,`<span class="hint">Pick one Most and one Least.</span><button class="btn" id="next" disabled>Continue</button>`);
  const opts=document.getElementById('opts');
  opts.querySelectorAll('.tagbtn').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.i, t=b.dataset.t;
    if(t==="m"){ if(S.cur.least===i)S.cur.least=null; S.cur.most=(S.cur.most===i?null:i); }
    else { if(S.cur.most===i)S.cur.most=null; S.cur.least=(S.cur.least===i?null:i); }
    opts.querySelectorAll('.opt').forEach(el=>{const ix=+el.dataset.i;
      el.classList.toggle('most',ix===S.cur.most); el.classList.toggle('least',ix===S.cur.least);
      el.querySelector('.tagbtn.m').classList.toggle('on',ix===S.cur.most);
      el.querySelector('.tagbtn.l').classList.toggle('on',ix===S.cur.least);});
    document.getElementById('next').disabled=!(S.cur.most!=null&&S.cur.least!=null);
  });
  document.getElementById('next').onclick=()=>commit(step);
}

/* RNK — Ranking/Prioritisation: click options in order of preference */
function renderRank(step){
  const it=step.it;
  const body=`
    <div class="stem">${it.stem}</div>
    <div class="prompt">Tap the options in order — your first tap is rank 1 (most likely), and so on.
    <a id="rreset" style="color:var(--navy);cursor:pointer;font-weight:600"> Reset</a></div>
    <div id="ranks">${it.options.map((o,i)=>`<div class="rankopt" data-i="${i}">
      <span class="rankbadge" data-b="${i}">–</span><span>${o.t}</span></div>`).join("")}</div>`;
  itemFrame(step,body,`<span class="hint rankhint" id="rhint">0 of ${it.options.length} ranked.</span><button class="btn" id="next" disabled>Continue</button>`);
  const wrap=document.getElementById('ranks');
  function paint(){wrap.querySelectorAll('.rankopt').forEach(el=>{const i=+el.dataset.i;const pos=S.cur.rank.indexOf(i);
    el.classList.toggle('done',pos>=0); el.querySelector('.rankbadge').textContent=pos>=0?(pos+1):"–";});
    document.getElementById('rhint').textContent=`${S.cur.rank.length} of ${it.options.length} ranked.`;
    document.getElementById('next').disabled=S.cur.rank.length!==it.options.length;}
  wrap.querySelectorAll('.rankopt').forEach(elm=>elm.onclick=()=>{const i=+elm.dataset.i;
    if(S.cur.rank.includes(i))return; S.cur.rank.push(i); paint();});
  document.getElementById('rreset').onclick=()=>{S.cur.rank=[];paint();};
  document.getElementById('next').onclick=()=>commit(step);
}

/* RCL (reverse-coded Likert) & BFS (behaviour frequency): 1–5 scale */
function renderScale(step){
  const it=step.it;
  const labels=it.type==="BFS"
    ? ["Never","Rarely","Sometimes","Often","Always"]
    : ["Strongly disagree","Disagree","Neutral","Agree","Strongly agree"];
  const body=`
    <div class="stem">${it.stem}</div>
    <div class="prompt">${it.type==="BFS"?"How often do you do this?":"How much do you agree?"}</div>
    <div class="scale" id="scale">${[1,2,3,4,5].map(n=>`<button data-n="${n}">
      <span class="n">${n}</span><span class="lab">${labels[n-1]}</span></button>`).join("")}</div>`;
  itemFrame(step,body,`<span class="hint">Select one.</span><button class="btn" id="next" disabled>Continue</button>`);
  const sc=document.getElementById('scale');
  sc.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    S.cur.val=+b.dataset.n;
    sc.querySelectorAll('button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');
    document.getElementById('next').disabled=false;});
  document.getElementById('next').onclick=()=>commit(step);
}

/* ============================ SCORING ENGINE ============================
   Raw Score -> Weighted Score -> Construct Score (0-100). Every item type is normalised to a
   bipolar value in [-1,+1] (how strongly the response endorses the construct), then weighted
   by the item-type reliability factor (Battery §2.2) before being averaged per construct.
   Reverse-coded RCL items invert the scale before normalising. IFC uses ipsative most/least
   matching. RNK uses the expert rank key. SJT uses the expert-keyed point value. */
function clip(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function pointsToValue(points,maxPoints){ if(!maxPoints) return 0; return clip((points/maxPoints)*2-1,-1,1); }

function add(code,val,type,attention){
  if(attention){
    S.attnTotal++; return; // attention checks never contribute to construct scores
  }
  if(!code) return;
  const w=REL[type]||1;
  S.scores[code]=(S.scores[code]||0)+val*w;
  S.counts[code]=(S.counts[code]||0)+1;
}

function commit(step){
  const it=step.it;
  if(it.attention){
    let pass=false;
    if(it.type==="BFS") pass=(S.cur.val===it.correct);
    if(it.type==="RCL") pass=(S.cur.val===it.correct);
    if(pass) S.attnPassed++;
    add(null,0,it.type,true);
    S.i++; renderStep(); return;
  }
  const code=step.construct;
  if(it.type==="SJT"){
    const L=it.options[S.cur.single].k;
    const sc=it.scoring.scores||{};
    const vals=Object.values(sc); const maxP=vals.length?Math.max(...vals):3;
    const points=(sc[L]!=null)?sc[L]:0;
    add(code, pointsToValue(points,maxP), it.type);
  } else if(it.type==="IFC"){
    const mostL=it.options[S.cur.most].k, leastL=it.options[S.cur.least].k;
    let points=0; if(mostL===it.scoring.most) points+=1; if(leastL===it.scoring.least) points+=1;
    add(code, pointsToValue(points,2), it.type);
  } else if(it.type==="RNK"){
    const firstL=it.options[S.cur.rank[0]].k;
    const rs=it.scoring.rank_scores||{};
    const vals=Object.values(rs); const maxP=vals.length?Math.max(...vals):2;
    const points=(rs[firstL]!=null)?rs[firstL]:0;
    add(code, pointsToValue(points,maxP), it.type);
  } else { // RCL / BFS — 1..5 scale, reverse-coded if flagged
    let r=S.cur.val; if(it.reverse) r=6-r;
    add(code, ((r-1)/4)*2-1, it.type);
  }
  S.i++; renderStep();
}

/* construct scores 0–100 (centred at 50); blank if not measured in this attempt.
   Also records a lightweight reliability/confidence indicator per construct (item count
   based, for now) so a future Cronbach's Alpha pass can slot in without touching this
   data shape — see CONSTRUCT_META below. */
function computeConstructs(){
  const out={}; const meta={};
  CONSTRUCT_CODES.forEach(code=>{
    const c=S.counts[code]||0;
    if(!c){out[code]="";meta[code]={n:0,confidence:"Not measured"};return;}
    const avg=(S.scores[code]||0)/c;                    // weighted average, range ~[-1,1]
    out[code]=clip(Math.round(50+avg*45),5,99);
    meta[code]={n:c, confidence: c>=4?"High":c>=2?"Moderate":"Low"};
  });
  return {scores:out, meta};
}

function finish(){
  clearInterval(timerInt);
  const {scores:sc, meta}=computeConstructs();
  const measured=CONSTRUCT_CODES.filter(c=>sc[c]!=="").length;
  const durMin=Math.max(1,Math.round((Date.now()-S.t0)/60000));
  const today=new Date().toISOString().slice(0,10);
  const rec={"Employee ID":S.emp.id,"Employee Name":S.emp.name,"Assessment Date":today,
    "Department":S.emp.dept,"Grade":S.emp.grade};
  CONSTRUCT_CODES.forEach(code=>rec[code]=sc[code]);
  rec["Constructs Measured"]=measured;
  rec["Assessment Duration"]=durMin+" min";
  rec["Assessment Version"]=VERSION;
  rec["Attempt"]=S.attempt;
  rec["Attention Checks Passed"]=S.attnPassed+"/"+S.attnTotal;
  saveResult(rec);
  saveMeta(S.emp.id, S.attempt, meta);                     // per-construct n/confidence, for admin View Record
  saveReassess(getReassess().filter(id=>id!==S.emp.id));   // one-time reassessment grant is now used
  submitToCloud(rec);
  S=null;
  setTag("Completed");
  document.getElementById('app').innerHTML=`<div class="done">
    ${PRISM_MARK}
    <div class="tick">✓</div>
    <h1>Assessment Successfully Completed</h1>
    <p>Thank you for completing the PRISM Behavioural Assessment.</p>
    <p>Your responses have been securely recorded.</p>
    <p>The HR Department will review your assessment as part of the overall talent assessment process.</p>
    <div class="close">You may now close this window.</div>
  </div>`;
}

/* Administrator-only: per-attempt construct measurement metadata (item count, confidence) — supports the
   admin "View Record" panel now, and future reliability (Cronbach's Alpha) reporting later without any
   change to this data shape. */
function metaKey(id,attempt){return "ttip_meta_"+id+"_"+attempt;}
function saveMeta(id,attempt,meta){try{localStorage.setItem(metaKey(id,attempt),JSON.stringify(meta));}catch(e){}}
function getMeta(id,attempt){try{return JSON.parse(localStorage.getItem(metaKey(id,attempt))||"null");}catch(e){return null;}}
const EXPORT_COLS=["Employee ID","Employee Name","Assessment Date","Department","Grade",
  ...CONSTRUCT_CODES,"Constructs Measured","Assessment Duration","Assessment Version","Attempt","Attention Checks Passed"];

  const ws=XLSX.utils.json_to_sheet(rows,{header:EXPORT_COLS});

}

  document.getElementById('masterFile').onchange=loadMasterFile;
  document.getElementById('expBtn').onclick=exportXlsx;
  document.getElementById('clrBtn').onclick=()=>{if(confirm("Remove ALL stored assessment records from this device? This does not affect the Employee Master.")){
    localStorage.removeItem("ttip_results");document.getElementById('clrStatus').textContent="All stored results cleared.";adminPortal();}};
  document.getElementById('exit').onclick=login;
  document.querySelectorAll('.tbtn').forEach(b=>b.onclick=()=>adminAction(b.dataset.act,+b.dataset.i));
}
function adminAction(act,i){
  const rows=getResults(); const r=rows[i]; if(!r)return;
  if(act==="exp"){exportOne(i);return;}
  if(act==="view"){viewRecord(i);return;}
  if(act==="del"){
    if(confirm(`Delete the assessment for ${r["Employee Name"]} (${r["Employee ID"]}), Attempt ${r["Attempt"]||1}? This removes only this record; the Employee Master is not affected.`)){
      rows.splice(i,1); setResults(rows); adminPortal();
    } return;
  }
  if(act==="re"){
    const id=r["Employee ID"]; const list=getReassess();
    if(list.includes(id)){ saveReassess(list.filter(x=>x!==id)); }   // toggle off
    else { list.push(id); saveReassess(list);
      alert(`${r["Employee Name"]} (${id}) may now take the assessment again. Previous attempts are preserved; the new attempt will be recorded as Attempt ${rows.filter(x=>x["Employee ID"]===id).length+1}.`); }
    adminPortal(); return;
  }
}
function viewRecord(i){
  const r=getResults()[i]; if(!r)return;
  const cell=v=>(v===""||v==null)?'<span style="color:#c0c8d0">—</span>':v;
  const consRows=CONSTRUCT_CODES.map(c=>`<tr><td style="color:#5B6B7C">${c}</td><td style="text-align:right;font-weight:600">${cell(r[c])}</td></tr>`).join("");
  document.getElementById('recDetail').innerHTML=`<div class="arow" style="margin-top:12px;background:#f7f9fc">
    <h3>Record — ${r["Employee Name"]} · ${r["Employee ID"]} · Attempt ${r["Attempt"]||1}</h3>
    <p class="amini">${r["Grade"]} · ${r["Department"]} · ${r["Assessment Date"]} · ${cell(r["Constructs Measured"])} constructs measured · ${cell(r["Assessment Duration"])}</p>
    <div style="max-height:260px;overflow:auto;margin-top:8px;border:1px solid var(--line);border-radius:8px">
      <table style="width:100%;border-collapse:collapse;font-size:11.5px">
        <thead><tr style="position:sticky;top:0;background:#eef4fb"><th style="text-align:left;padding:5px 8px">Construct</th><th style="text-align:right;padding:5px 8px">Score (0–100)</th></tr></thead>
        <tbody>${consRows}</tbody></table></div>
    <p style="margin-top:8px"><button class="btn btn-ghost" id="rdClose">Close record</button>
      <button class="btn" id="rdExp" style="margin-left:8px">Export this record</button></p></div>`;
  document.getElementById('rdClose').onclick=()=>{document.getElementById('recDetail').innerHTML="";};
  document.getElementById('rdExp').onclick=()=>exportOne(i);
  document.getElementById('recDetail').scrollIntoView({behavior:"smooth",block:"nearest"});
}
function parseCSV(text){
  // strip UTF-8 BOM, normalise Windows/Mac line endings
  text=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const rows=[]; let field="",row=[],q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; }
      else field+=c;
    } else if(c==='"'){ q=true; }
    else if(c===','){ row.push(field); field=""; }
    else if(c==='\n'){ row.push(field); rows.push(row); field=""; row=[]; }
    else field+=c;
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(v=>String(v).trim()!==""));
}
function loadMasterFile(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{
      const rows=parseCSV(String(rd.result));
      if(rows.length<2)throw new Error("no rows");
      const hdr=rows[0].map(h=>String(h).trim());
      const idx=n=>hdr.findIndex(h=>h.toLowerCase()===n.toLowerCase());
      const col=(r,...names)=>{for(const n of names){const j=idx(n);if(j>=0&&r[j]!=null)return String(r[j]).trim();}return "";};
      const map=rows.slice(1).map(r=>({
        id:col(r,"Employee ID","id"),
        name:col(r,"Employee Name","name"),
        grade:col(r,"Grade","grade"),
        dept:col(r,"Department","dept"),
        fn:col(r,"Function","fn")||col(r,"Department","dept"),
        desig:col(r,"Designation","desig")
      })).filter(r=>r.id&&r.name);
      if(!map.length)throw new Error("no valid rows");
      localStorage.setItem("ttip_master",JSON.stringify(map));   // stored until Administrator clears; assessment data untouched
      document.getElementById('masterStatus').innerHTML=`<span style="color:#1f7a2b">Loaded ${map.length} employees. Login now validates against your list.</span>`;
    }catch(err){document.getElementById('masterStatus').innerHTML=`<span style="color:#b3403a">Could not read that file. Use a CSV with an Employee ID and Employee Name column.</span>`;}};
  rd.readAsText(f,"UTF-8");
}
